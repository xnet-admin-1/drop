<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Drop</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="/static/manifest.json">
<link rel="stylesheet" href="/static/xterm.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;height:100vh;display:flex;flex-direction:column;overflow:hidden;overscroll-behavior:none}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.hdr h1{font-size:16px;color:var(--accent);font-weight:600}
.hdr-right{display:flex;gap:8px;align-items:center}
.tabs{display:flex;gap:0;margin-left:16px}
.tab{padding:6px 16px;font-size:13px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}
.panel{flex:1;overflow:hidden;display:none}
.panel.active{display:flex;flex-direction:column}
#drop-panel{overflow-y:auto;padding:16px}
#drop-panel .inner{max-width:1000px;margin:0 auto;width:100%}
.drop{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;color:var(--dim);cursor:pointer;transition:all .2s;margin-bottom:16px}
.drop.over{border-color:var(--accent);background:rgba(88,166,255,.05);color:var(--accent)}
.drop input{display:none}
.bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.bar.active{display:block}
.bar .fill{height:100%;background:var(--accent);transition:width .2s;width:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.item{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative}
.item img{width:100%;aspect-ratio:1;object-fit:cover;display:block;cursor:pointer}
.item .placeholder{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--dim);background:var(--bg)}
.item .info{padding:8px;font-size:11px;overflow:hidden}
.item .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);font-weight:500}
.item .meta{color:var(--dim);margin-top:2px}
.item .del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border:none;color:var(--red);font-size:14px;width:24px;height:24px;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center}
.item:hover .del{display:flex}
.empty{text-align:center;color:var(--dim);padding:40px;font-size:14px}
.count{font-size:12px;color:var(--dim)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;display:none;align-items:center;justify-content:center;cursor:pointer}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:8px}
.lightbox.on{display:flex}
#term-panel{background:#000;overflow:hidden;overscroll-behavior:none}
#extra-keys{display:none;background:#020817;flex-shrink:0;touch-action:manipulation;position:fixed;bottom:0;left:0;right:0;z-index:50}
@media (hover:none) and (pointer:coarse){#extra-keys{display:flex}}
.ts-overlay{position:absolute;inset:0;pointer-events:none;z-index:100}
.ts-handle{position:absolute;width:24px;height:24px;background:#2196F3;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:none;pointer-events:auto;touch-action:none;z-index:101;border-radius:50% 50% 50% 0}
.ts-handle-start{transform:rotate(180deg) translateX(87%)}
.ts-handle-end{transform:rotate(90deg) translateY(-13%)}
.ts-menu{position:absolute;background:#1e293b;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.5);border:1px solid #334155;z-index:1000;display:none;flex-direction:row;align-items:center;pointer-events:auto;animation:tsFade .15s ease}
.ts-menu button{flex:1;padding:10px 16px;border:none;background:transparent;color:#e2e8f0;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}
.ts-menu button:active{background:#334155}
@keyframes tsFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#extra-keys .ek{flex:1;text-align:center;padding:10px 0;font-size:12px;font-family:monospace;color:#f8fafc;background:#0f1729;margin-right:1px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .1s}
#extra-keys .ek:last-child{margin-right:0}
#extra-keys .ek:active{background:#1e293b}
#extra-keys .ek.armed{background:#1a3a1a;color:#88ff88}
#extra-keys .ek.locked{background:#3a1a1a;color:#ff8888}
#term-box{flex:1;overflow:hidden;min-height:0}
@media (hover:none) and (pointer:coarse){
  #term-box .xterm-viewport{overflow-y:scroll!important;scroll-behavior:smooth;overscroll-behavior:contain}
  #term-box .xterm-viewport::-webkit-scrollbar{width:30px;background:#0d1117}
  #term-box .xterm-viewport::-webkit-scrollbar-thumb{background:#30363d;border-radius:15px;border:6px solid #0d1117;min-height:20px}
  #term-box .xterm-viewport::-webkit-scrollbar-thumb:active{background:#58a6ff}
}
@media (hover:none) and (pointer:coarse){#term-box{margin-bottom:36px}}
.btn-icon{background:none;border:1px solid var(--border);color:var(--dim);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px}
.btn-icon:hover{color:var(--text);border-color:var(--dim)}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;align-items:center">
    <h1>Drop</h1>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('drop')">Files</div>
      <div class="tab" onclick="switchTab('term')">Terminal</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="count" id="count"></span>
    <button onclick="refresh()" class="btn-icon" title="Refresh">↻</button>
    <button onclick="showCreds()" class="btn-icon">⚙</button>
  </div>
</div>

<div class="panel active" id="drop-panel">
<div class="inner">
<div class="drop" id="drop" onclick="document.getElementById('fi').click()">
  Drop files here or tap to upload
  <input type="file" id="fi" multiple>
  <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
</div>
<div class="grid" id="grid"></div>
</div>
</div>

<div class="panel" id="term-panel">
<div id="term-box"></div>
<div id="extra-keys"></div>
</div>

<div class="lightbox" id="lb" onclick="this.classList.remove('on')"><img id="lbi"></div>
<div id="credModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center">
<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:340px">
<h3 style="margin-bottom:12px;color:var(--accent)">Credentials</h3>
<label for="cUser" style="font-size:11px;color:var(--dim)">Username</label>
<input id="cUser" style="width:100%;margin-bottom:8px;padding:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px">
<label for="cPass" style="font-size:11px;color:var(--dim)">New Password</label>
<input id="cPass" type="password" style="width:100%;margin-bottom:12px;padding:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px">
<div style="display:flex;gap:8px;justify-content:flex-end">
<button onclick="saveCreds()" style="background:var(--green);color:#000;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px">Save</button>
<button onclick="document.getElementById('credModal').style.display='none'" style="background:var(--border);color:var(--text);border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px">Cancel</button>
</div></div></div>
<div class="toast" id="toast"></div>

<script src="/static/xterm.min.js"></script>
<script src="/static/addon-fit.min.js"></script>
<script src="/static/addon-web-links.min.js"></script>
<script>
const F=(u,o)=>fetch(u,{...o});
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}
function fmt(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}
function ext(n){const i=n.lastIndexOf('.');return i>0?n.slice(i+1).toUpperCase():'?'}

// Tab switching
let termInit=false,term,fit,ws;
const isMobile=matchMedia('(hover:none) and (pointer:coarse)').matches;
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',t.textContent.trim()===(name==='drop'?'Files':'Terminal')));
  document.getElementById('drop-panel').classList.toggle('active',name==='drop');
  document.getElementById('term-panel').classList.toggle('active',name==='term');
  if(name==='term'&&!termInit)initTerm();
  if(name==='term'&&fit)setTimeout(()=>fit.fit(),0);
}

function initTerm(){
  termInit=true;
  term=new Terminal({cursorBlink:true,fontSize:14,scrollback:5000,tabStopWidth:4,fontFamily:'Menlo,Monaco,Consolas,monospace',fontWeightBold:'normal',allowProposedApi:true,rightClickSelectsWord:true,theme:{background:'#0d1117',foreground:'#dcdcdc'}});
  fit=new FitAddon.FitAddon();
  term.loadAddon(fit);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());
  term.open(document.getElementById('term-box'));
  fit.fit();
  term.onData(d=>{if(ws&&ws.readyState===1){const e=new TextEncoder().encode(d);const buf=new Uint8Array(1+e.length);buf[0]=0x01;buf.set(e,1);ws.send(buf)}});
  let resizeTimer;
  term.onResize(({cols,rows})=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{if(ws&&ws.readyState===1){const buf=new Uint8Array(5);buf[0]=0x04;buf[1]=cols>>8;buf[2]=cols&0xff;buf[3]=rows>>8;buf[4]=rows&0xff;ws.send(buf)}},150)});
  term.attachCustomKeyEventHandler(e=>{
    if(e.type==='keydown'&&e.ctrlKey&&!e.shiftKey&&e.key==='c'&&term.hasSelection()){navigator.clipboard.writeText(term.getSelection());term.clearSelection();return false}
    if(e.type==='keydown'&&e.ctrlKey&&e.shiftKey&&e.key==='V'){navigator.clipboard.readText().then(t=>{if(ws&&ws.readyState===1){const e=new TextEncoder().encode(t);const buf=new Uint8Array(1+e.length);buf[0]=0x01;buf.set(e,1);ws.send(buf)}});return false}
    if(e.type==='keydown'&&e.ctrlKey&&e.shiftKey&&e.key==='A'){term.selectAll();return false}
    return true;
  });
  connectWs();
}

function connectWs(){
  if(ws){try{ws.onclose=null;ws.close()}catch(e){}}
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host+'/ws/term');
  ws.binaryType='arraybuffer';
  ws.onopen=()=>{
    retries=0;term.reset();
    try{fit.fit()}catch(e){}
    // Send resize immediately so PTY knows dimensions before replay
    const buf=new Uint8Array(5);buf[0]=0x04;buf[1]=term.cols>>8;buf[2]=term.cols&0xff;buf[3]=term.rows>>8;buf[4]=term.rows&0xff;
    ws.send(buf);
    startHeartbeat();
    // Scroll to bottom after replay finishes
    setTimeout(()=>term.scrollToBottom(),500);
  };
  ws.onmessage=e=>{
    const d=new Uint8Array(e.data);
    if(d[0]===0x01){term.write(d.subarray(1));clearTimeout(scrollTimer);scrollTimer=setTimeout(()=>term.scrollToBottom(),200)}
    else if(d[0]===0x07)lastPong=Date.now();
  };
  ws.onclose=()=>{stopHeartbeat();reconnect()};
  ws.onerror=()=>{};
}

let retries=0,scrollTimer;
function reconnect(){
  if(retries===0)term.write('\r\n\x1b[31m[reconnecting');
  if(retries>=20){term.write(' gave up]\x1b[0m\r\n');return}
  retries++;
  term.write('.');
  setTimeout(connectWs,Math.min(retries*1000,10000));
}

let hbInterval,lastPong=Date.now();
function startHeartbeat(){lastPong=Date.now();hbInterval=setInterval(()=>{if(Date.now()-lastPong>60000){ws.close();return}if(ws&&ws.readyState===1)ws.send(new Uint8Array([0x07]))},25000)}
function stopHeartbeat(){clearInterval(hbInterval)}

function resize(){
  if(!fit)return;
  try{fit.fit()}catch(e){}
}
window.addEventListener('resize',()=>{if(term&&fit)resize()});
new ResizeObserver(()=>{if(term&&fit&&document.getElementById('term-panel').classList.contains('active'))resize()}).observe(document.getElementById('term-box'));

// Files
async function load(){
  const files=await(await F('/api/files')).json();
  document.getElementById('count').textContent=files.length+' files';
  const g=document.getElementById('grid');
  if(!files.length){g.innerHTML='<div class="empty">No files yet</div>';return}
  g.innerHTML=files.map(f=>{
    const thumb=f.isImage?`<img src="/api/files/${encodeURIComponent(f.name)}" loading="lazy" onclick="view('${f.name.replace(/'/g,"\\'")}')">`:`<div class="placeholder">${ext(f.name)}</div>`;
    return`<div class="item">${thumb}<div class="info"><div class="name"><a href="/api/files/${encodeURIComponent(f.name)}" style="color:inherit;text-decoration:none" title="${f.name}">${f.name}</a></div><div class="meta">${fmt(f.size)} · ${new Date(f.modTime).toLocaleDateString()}</div></div><button class="del" onclick="del('${f.name.replace(/'/g,"\\'")}')">✕</button></div>`}).join('');
}
function view(name){document.getElementById('lbi').src='/api/files/'+encodeURIComponent(name);document.getElementById('lb').classList.add('on')}
async function del(name){if(!confirm('Delete '+name+'?'))return;await F('/api/files/'+encodeURIComponent(name),{method:'DELETE'});toast('Deleted');load()}
async function upload(files){
  const bar=document.getElementById('bar'),fill=document.getElementById('fill');
  bar.classList.add('active');
  for(let i=0;i<files.length;i++){fill.style.width=((i/files.length)*100)+'%';const fd=new FormData();fd.append('file',files[i]);await F('/api/files',{method:'POST',body:fd})}
  fill.style.width='100%';setTimeout(()=>{bar.classList.remove('active');fill.style.width='0'},500);
  toast(files.length+' file'+(files.length>1?'s':'')+' uploaded');load();
}
const drop=document.getElementById('drop');
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');upload(e.dataTransfer.files)};
document.getElementById('fi').onchange=e=>upload(e.target.files);

async function showCreds(){const r=await(await F('/api/creds')).json();document.getElementById('cUser').value=r.user||'';document.getElementById('cPass').value='';document.getElementById('credModal').style.display='flex'}
async function saveCreds(){const user=document.getElementById('cUser').value.trim(),pass=document.getElementById('cPass').value;if(!user||!pass){toast('Both fields required');return}await F('/api/creds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,pass})});document.getElementById('credModal').style.display='none';toast('Credentials updated — re-login required')}

function refresh(){
  if(document.getElementById('drop-panel').classList.contains('active'))load();
  else if(ws&&sess){term.clear();ws.onclose=null;ws.close();connectWs()}
}

// Extra keys
const ekDef=[
  {l:'ESC',seq:'\x1b'},{l:'TAB',seq:'\t'},{l:'CTRL',mod:true},{l:'ALT',mod:true},
  {l:'↑',seq:'\x1b[A'},{l:'↓',seq:'\x1b[B'},{l:'←',seq:'\x1b[D'},{l:'→',seq:'\x1b[C'},
  {l:'HOME',seq:'\x1b[H'},{l:'END',seq:'\x1b[F'},{l:'DEL',seq:'\x1b[3~'}
];
const ekState={CTRL:0,ALT:0};
function initExtraKeys(){
  const bar=document.getElementById('extra-keys');
  ekDef.forEach(k=>{
    const el=document.createElement('div');
    el.className='ek';el.textContent=k.l;el.dataset.key=k.l;
    if(k.mod){
      el.addEventListener('click',()=>{
        ekState[k.l]=(ekState[k.l]+1)%3;
        el.className='ek'+(ekState[k.l]===1?' armed':ekState[k.l]===2?' locked':'');
      });
    }else{
      el.addEventListener('click',()=>{
        el.style.background='#1e293b';setTimeout(()=>el.style.background='',120);
        sendEk(k.seq);
      });
    }
    bar.appendChild(el);
  });
}
function sendEk(seq){
  if(!ws||ws.readyState!==1)return;
  let data=seq;
  if(ekState.ALT&&seq.length===1)data='\x1b'+seq;
  if(ekState.CTRL&&seq.length===1){const c=seq.toLowerCase().charCodeAt(0)-96;if(c>0&&c<27)data=String.fromCharCode(c)}
  const e=new TextEncoder().encode(data);
  const buf=new Uint8Array(1+e.length);buf[0]=0x01;buf.set(e,1);ws.send(buf);
  ['CTRL','ALT'].forEach(m=>{if(ekState[m]===1){ekState[m]=0;document.querySelector(`.ek[data-key="${m}"]`).className='ek'}});
  term.focus();
}
initExtraKeys();

// Touch selection (Acode-style) - long press to select, drag handles, context menu
if(isMobile){
  const TS={
    selecting:false,dragging:false,start:null,end:null,dragType:null,
    overlay:null,hStart:null,hEnd:null,menu:null,holdTimer:null,
    cellW:0,cellH:0,touchStart:{x:0,y:0},
    init(){
      this.overlay=document.createElement('div');this.overlay.className='ts-overlay';
      this.hStart=this.mkHandle('start');this.hEnd=this.mkHandle('end');
      this.menu=document.createElement('div');this.menu.className='ts-menu';
      ['Copy','Paste','All'].forEach(l=>{
        const b=document.createElement('button');b.textContent=l;
        b.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();this['act'+l]()});
        this.menu.appendChild(b);
      });
      this.overlay.append(this.hStart,this.hEnd,this.menu);
      setTimeout(()=>{
        term.element.style.position='relative';
        term.element.appendChild(this.overlay);
        this.updateCell();
        term.element.addEventListener('touchstart',e=>this.onTouchStart(e),{passive:false});
        term.element.addEventListener('touchmove',e=>this.onTouchMove(e),{passive:false});
        term.element.addEventListener('touchend',e=>this.onTouchEnd(e),{passive:false});
        this.hStart.addEventListener('touchstart',e=>this.onHStart(e),{passive:false});
        this.hStart.addEventListener('touchmove',e=>this.onHMove(e),{passive:false});
        this.hStart.addEventListener('touchend',e=>this.onHEnd(e),{passive:false});
        this.hEnd.addEventListener('touchstart',e=>this.onHStart(e),{passive:false});
        this.hEnd.addEventListener('touchmove',e=>this.onHMove(e),{passive:false});
        this.hEnd.addEventListener('touchend',e=>this.onHEnd(e),{passive:false});
      },500);
    },
    mkHandle(type){const h=document.createElement('div');h.className='ts-handle ts-handle-'+type;h.dataset.type=type;return h},
    updateCell(){
      if(term._core&&term._core._renderService){
        const d=term._core._renderService.dimensions;
        if(d&&d.css&&d.css.cell){this.cellW=d.css.cell.width;this.cellH=d.css.cell.height}
      }
    },
    touchToCoords(t){
      const r=term.element.getBoundingClientRect();
      const x=t.clientX-r.left,y=t.clientY-r.top;
      if(x<0||y<0||x>r.width||y>r.height)return null;
      const col=Math.floor(x/this.cellW),row=Math.floor(y/this.cellH)+term.buffer.active.viewportY;
      return{col:Math.max(0,Math.min(col,term.cols-1)),row:Math.max(0,row)};
    },
    coordsToPx(c){
      const vy=term.buffer.active.viewportY;
      if(c.row<vy||c.row>=vy+term.rows)return null;
      return{x:c.col*this.cellW,y:(c.row-vy)*this.cellH};
    },
    wordAt(c){
      const line=term.buffer.active.getLine(c.row);if(!line)return null;
      const t=line.translateToString(false);if(!t||c.col>=t.length)return null;
      if(!/[\w.\-\/]/.test(t[c.col]))return null;
      let s=c.col,e=c.col;
      while(s>0&&/[\w.\-\/]/.test(t[s-1]))s--;
      while(e<t.length-1&&/[\w.\-\/]/.test(t[e+1]))e++;
      return e>s?{start:{row:c.row,col:s},end:{row:c.row,col:e}}:null;
    },
    selLen(sr,sc,er,ec){
      if(sr===er)return ec-sc+1;
      return(term.cols-sc)+(er-sr-1)*term.cols+(ec+1);
    },
    applySel(){
      if(!this.start||!this.end)return;
      let sr=this.start.row,sc=this.start.col,er=this.end.row,ec=this.end.col;
      if(sr>er||(sr===er&&sc>ec))[sr,sc,er,ec]=[er,ec,sr,sc];
      term.clearSelection();term.select(sc,sr,this.selLen(sr,sc,er,ec));
      this.posHandles();
    },
    posHandles(){
      if(!this.start||!this.end)return;
      let ls=this.start,le=this.end;
      if(ls.row>le.row||(ls.row===le.row&&ls.col>le.col))[ls,le]=[le,ls];
      const sp=this.coordsToPx(ls),ep=this.coordsToPx(le);
      if(sp){this.hStart.style.display='block';this.hStart.style.left=sp.x+'px';this.hStart.style.top=(sp.y+this.cellH+2)+'px'}
      else this.hStart.style.display='none';
      if(ep){this.hEnd.style.display='block';this.hEnd.style.left=(ep.x+this.cellW)+'px';this.hEnd.style.top=(ep.y+this.cellH+2)+'px'}
      else this.hEnd.style.display='none';
    },
    showMenu(){
      const sp=this.start?this.coordsToPx(this.start):null;
      const ep=this.end?this.coordsToPx(this.end):null;
      if(!sp&&!ep){this.menu.style.display='none';return}
      this.menu.style.display='flex';
      const mw=this.menu.offsetWidth||180,cw=term.element.offsetWidth;
      let mx=((sp?sp.x:ep.x)+(ep?ep.x:sp.x))/2-mw/2;
      let my=(sp?sp.y:ep.y)-44;
      if(my<4)my=(ep?ep.y:sp.y)+this.cellH+30;
      mx=Math.max(4,Math.min(mx,cw-mw-4));
      this.menu.style.left=mx+'px';this.menu.style.top=my+'px';
    },
    clear(){
      this.selecting=false;this.start=this.end=null;
      term.clearSelection();this.hStart.style.display=this.hEnd.style.display='none';
      this.menu.style.display='none';
    },
    onTouchStart(e){
      if(e.touches.length!==1)return;
      const t=e.touches[0];this.touchStart={x:t.clientX,y:t.clientY};
      if(this.selecting){this.menu.style.display='none';this._clearPending=true;this._clearMoved=false;return}
      if(t.clientX<=30||t.clientX>=window.innerWidth-30)return;
      clearTimeout(this.holdTimer);
      this.holdTimer=setTimeout(()=>{
        if(this.selecting)return;
        this.updateCell();
        const c=this.touchToCoords(t);if(!c)return;
        const w=this.wordAt(c);
        if(w){this.start=w.start;this.end=w.end}else{this.start=c;this.end={...c}}
        this.selecting=true;this.applySel();this.showMenu();
        if(navigator.vibrate)navigator.vibrate(30);
      },500);
    },
    onTouchMove(e){
      if(e.touches.length!==1)return;
      const t=e.touches[0],dx=Math.abs(t.clientX-this.touchStart.x),dy=Math.abs(t.clientY-this.touchStart.y);
      if(dx>8||dy>8){clearTimeout(this.holdTimer);if(this._clearPending)this._clearMoved=true}
    },
    onTouchEnd(e){
      clearTimeout(this.holdTimer);
      if(this._clearPending){
        if(!this._clearMoved)this.clear();
        else if(this.selecting)this.showMenu();
        this._clearPending=false;return;
      }
    },
    onHStart(e){
      e.preventDefault();e.stopPropagation();
      if(e.touches.length!==1)return;
      this.dragging=true;
      this.dragType=e.target.dataset.type||(e.target===this.hStart?'start':'end');
    },
    onHMove(e){
      if(!this.dragging||e.touches.length!==1)return;
      e.preventDefault();e.stopPropagation();
      const t=e.touches[0],c=this.touchToCoords({clientX:t.clientX,clientY:t.clientY-35});
      if(!c)return;
      if(this.dragType==='start'){
        this.start=c;
        if(this.end&&(c.row>this.end.row||(c.row===this.end.row&&c.col>this.end.col))){
          [this.start,this.end]=[this.end,this.start];this.dragType='end';
        }
      }else{
        this.end=c;
        if(this.start&&(c.row<this.start.row||(c.row===this.start.row&&c.col<this.start.col))){
          [this.start,this.end]=[this.end,this.start];this.dragType='start';
        }
      }
      this.applySel();this.menu.style.display='none';
    },
    onHEnd(e){
      e.preventDefault();e.stopPropagation();
      this.dragging=false;this.dragType=null;
      if(this.selecting)this.showMenu();
    },
    actCopy(){const s=term.getSelection();if(s)navigator.clipboard.writeText(s).catch(()=>{});this.clear();toast('Copied')},
    actPaste(){navigator.clipboard.readText().then(t=>{if(t&&ws&&ws.readyState===1){const e=new TextEncoder().encode(t);const buf=new Uint8Array(1+e.length);buf[0]=0x01;buf.set(e,1);ws.send(buf)}}).catch(()=>{});this.clear()},
    actAll(){term.selectAll();this.start=null;this.end=null;this.selecting=true;this.hStart.style.display=this.hEnd.style.display='none';this.showMenu()}
  };
  TS.init();
}
if(isMobile&&window.visualViewport){
  const ek=document.getElementById('extra-keys');
  const reposKeys=()=>{
    const off=window.innerHeight-visualViewport.height-visualViewport.offsetTop;
    ek.style.bottom=Math.max(0,off)+'px';
    document.body.style.height=visualViewport.height+'px';
    if(term&&fit)try{fit.fit()}catch(e){}
  };
  visualViewport.addEventListener('resize',reposKeys);
  visualViewport.addEventListener('scroll',reposKeys);
}

load();
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'))e.preventDefault();if(e.key==='F12')e.preventDefault()});
if('serviceWorker' in navigator)navigator.serviceWorker.register('/static/sw.js');
</script>
