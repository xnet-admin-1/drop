<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drop Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>*{margin:0;padding:0}body{background:#000;overflow:hidden}#t{height:100vh}</style>
</head><body>
<div id="t"></div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
const term=new Terminal({cursorBlink:true,fontSize:14,theme:{background:'#020918'}});
const fit=new FitAddon.FitAddon();
term.loadAddon(fit);
term.loadAddon(new WebLinksAddon.WebLinksAddon());
term.open(document.getElementById('t'));
fit.fit();

const proto=location.protocol==='https:'?'wss:':'ws:';
const ws=new WebSocket(proto+'//'+location.host+'/ws/term');
ws.binaryType='arraybuffer';

ws.onopen=()=>{
  resize();
  term.onData(d=>ws.send(new TextEncoder().encode(d)));
  term.onBinary(d=>{const b=new Uint8Array(d.length);for(let i=0;i<d.length;i++)b[i]=d.charCodeAt(i);ws.send(b)});
};
ws.onmessage=e=>term.write(typeof e.data==='string'?e.data:new Uint8Array(e.data));
ws.onclose=()=>term.write('\r\n\x1b[31m[disconnected]\x1b[0m');

function resize(){
  fit.fit();
  const payload=JSON.stringify({Cols:term.cols,Rows:term.rows});
  const buf=new Uint8Array(1+payload.length);
  buf[0]=1;
  new TextEncoder().encodeInto(payload,buf.subarray(1));
  ws.send(buf);
}
window.addEventListener('resize',resize);
term.focus();
</script>
</body></html>
